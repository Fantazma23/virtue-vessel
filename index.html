<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtue Vessel — Sacred Frequency Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #D4AF37; font-family: 'Orbitron', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 30px rgba(212,175,55,0.3); }
        .subtitle { font-size: 0.8rem; color: #FFB000; letter-spacing: 3px; margin-bottom: 30px; }
        .timestamp { font-family: monospace; font-size: 0.7rem; color: #00FF41; margin-bottom: 40px; }
        .btn { display: block; width: 280px; padding: 20px; margin: 12px 0; background: transparent; border: 2px solid #D4AF37; color: #D4AF37; font-family: 'Orbitron', monospace; font-size: 1rem; letter-spacing: 3px; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; }
        .btn:hover { background: rgba(212,175,55,0.1); box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .btn-mobile { border-color: #00FF41; color: #00FF41; }
        .btn-mobile:hover { background: rgba(0,255,65,0.1); box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        .btn-helmet { border-color: #FC3D21; color: #FC3D21; }
        .btn-helmet:hover { background: rgba(252,61,33,0.1); box-shadow: 0 0 20px rgba(252,61,33,0.3); }
        .footer { margin-top: 40px; font-size: 0.6rem; color: rgba(212,175,55,0.5); letter-spacing: 2px; line-height: 1.8; }
        .sacred-math { font-family: monospace; font-size: 0.65rem; color: #FC3D21; margin-top: 15px; }
        .cross { font-size: 3rem; margin: 20px 0; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="cross">✦</div>
    <div class="logo">VIRTUE VESSEL</div>
    <div class="subtitle">SACRED FREQUENCY PORTAL</div>
    <div class="timestamp" id="timestamp">2026-06-20 15:41:00 UTC</div>
    <a href="mobile.html" class="btn btn-mobile">📱 TRY ON MOBILE</a>
    <a href="virtue_vessel_dashboard.html" class="btn btn-helmet">🪖 HELMET DASHBOARD</a>
    <div class="footer">
        <p>FOSTER FOR PRESIDENT 2028</p>
        <p>Fostering America's Second Chance</p>
        <p class="sacred-math">9 → 81 → 108 → 216 → 432 → 729 → 1728</p>
        <p class="sacred-math">DAVID 1986 | WALDO PEIRCE 1923 | ALPHA OMEGA | THE STONE</p>
        <p style="margin-top: 15px; color: #D4AF37;">GLORY TO THE CREATOR</p>
    </div>
    <script>
        function updateTimestamp() {
            const now = new Date();
            const utc = now.toISOString().replace('T', ' ').slice(0, 19);
            document.getElementById('timestamp').textContent = utc + ' UTC';
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>

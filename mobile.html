<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTUE VESSEL MOBILE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root { --gold: #D4AF37; --green: #00FF41; --red: #FC3D21; --amber: #FFB000; }
        body { background: #000; color: var(--green); font-family: 'Orbitron', monospace; min-height: 100vh; padding: 15px; }
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(212,175,55,0.3); margin-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .header .sub { font-size: 0.6rem; color: var(--amber); letter-spacing: 2px; margin-top: 5px; }
        .countdown { text-align: center; margin: 20px 0; padding: 15px; background: rgba(11,61,145,0.15); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; }
        .countdown .label { font-size: 0.7rem; color: var(--gold); letter-spacing: 3px; }
        .countdown .num { font-family: 'Share Tech Mono', monospace; font-size: 3.5rem; color: var(--red); text-shadow: 0 0 20px rgba(252,61,33,0.5); letter-spacing: 4px; }
        .countdown .info { font-size: 0.65rem; color: var(--amber); margin-top: 8px; }
        .btn { width: 100%; padding: 18px; margin: 8px 0; background: transparent; border: 2px solid var(--gold); color: var(--gold); font-family: 'Orbitron', monospace; font-size: 1rem; letter-spacing: 3px; border-radius: 8px; cursor: pointer; -webkit-appearance: none; }
        .btn:active { background: rgba(212,175,55,0.2); transform: scale(0.98); }
        .btn.active { background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.4); color: var(--green); border-color: var(--green); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .freq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .freq-card { background: rgba(11,61,145,0.15); border: 1px solid rgba(0,255,65,0.2); border-radius: 8px; padding: 12px 8px; text-align: center; cursor: pointer; position: relative; }
        .freq-card:active { transform: scale(0.95); }
        .freq-card.active { border-color: var(--gold); background: rgba(212,175,55,0.15); box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .freq-card .icon { font-size: 1.5rem; margin-bottom: 5px; }
        .freq-card .name { font-size: 0.6rem; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
        .freq-card .hz { font-family: 'Share Tech Mono', monospace; font-size: 1.1rem; color: var(--green); }
        .freq-card .ind { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: rgba(0,255,65,0.2); border: 1px solid rgba(0,255,65,0.3); }
        .freq-card.active .ind { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .slider-box { margin: 15px 0; padding: 15px; background: rgba(11,61,145,0.15); border: 1px solid rgba(0,255,65,0.2); border-radius: 8px; }
        .slider-box h3 { font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 10px; }
        .slider-val { font-family: 'Share Tech Mono', monospace; font-size: 1.5rem; color: var(--gold); text-align: center; margin: 8px 0; }
        input[type=range] { width: 100%; height: 6px; -webkit-appearance: none; background: rgba(0,255,65,0.2); border-radius: 3px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--gold); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .scope { width: 100%; height: 100px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,65,0.2); border-radius: 8px; margin: 15px 0; }
        .scope canvas { width: 100%; height: 100%; }
        .footer { text-align: center; padding: 20px 10px; border-top: 1px solid rgba(212,175,55,0.3); margin-top: 20px; }
        .footer p { font-size: 0.6rem; color: rgba(212,175,55,0.5); letter-spacing: 2px; }
        .footer .bless { font-size: 0.75rem; color: var(--gold); margin-top: 8px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>✦ VIRTUE VESSEL</h1>
        <div class="sub">MOBILE SACRED FREQUENCY</div>
    </div>
    <div class="countdown">
        <div class="label">SACRED CYCLE</div>
        <div class="num" id="cd">39.00</div>
        <div class="info" id="ci">CYCLE 1/7 — THE STONE</div>
    </div>
    <button class="btn" id="mb" onclick="tm()">ACTIVATE THE SLING</button>
    <button class="btn" onclick="ds()">DAVID SEQUENCE</button>
    <button class="btn btn-danger" onclick="sa()">SILENCE</button>
    <div class="freq-grid">
        <div class="freq-card" id="c1" onclick="tf(1)"><div class="ind" id="i1"></div><div class="icon">✦</div><div class="name">The Stone</div><div class="hz">1728 Hz</div></div>
        <div class="freq-card" id="c2" onclick="tf(2)"><div class="ind" id="i2"></div><div class="icon">AΩ</div><div class="name">Alpha Omega</div><div class="hz">432 Hz</div></div>
        <div class="freq-card" id="c3" onclick="tf(3)"><div class="ind" id="i3"></div><div class="icon">⚖</div><div class="name">AOC Seal</div><div class="hz">108 Hz</div></div>
        <div class="freq-card" id="c4" onclick="tf(4)"><div class="ind" id="i4"></div><div class="icon">👁</div><div class="name">The Eye</div><div class="hz">216 Hz</div></div>
        <div class="freq-card" id="c5" onclick="tf(5)"><div class="ind" id="i5"></div><div class="icon">🐴</div><div class="name">Foster 2028</div><div class="hz">81 Hz</div></div>
        <div class="freq-card" id="c6" onclick="tf(6)"><div class="ind" id="i6"></div><div class="icon">🪨</div><div class="name">David</div><div class="hz">9 Hz</div></div>
        <div class="freq-card" id="c7" onclick="tf(7)"><div class="ind" id="i7"></div><div class="icon">✋</div><div class="name">The Servant</div><div class="hz">729 Hz</div></div>
    </div>
    <div class="slider-box">
        <h3>⚡ TUNE FREQUENCY</h3>
        <div class="slider-val" id="sv">1728 Hz</div>
        <input type="range" id="sl" min="1" max="2000" value="1728" oninput="us(this.value)">
    </div>
    <div class="scope"><canvas id="sc"></canvas></div>
    <div class="footer">
        <p>VIRTUE VESSEL MK.I | FOSTER 2028</p>
        <p class="bless">GLORY TO THE CREATOR</p>
    </div>
    <script>
        let ac=null, os={}, ip={}, ma=false;
        let ct=39, cc=1, cv=39;
        const sf={1:{n:'THE STONE',h:1728},2:{n:'ALPHA OMEGA',h:432},3:{n:'AOC SEAL',h:108},4:{n:'THE EYE',h:216},5:{n:'FOSTER 2028',h:81},6:{n:'DAVID',h:9},7:{n:'THE SERVANT',h:729}};
        function ia(){if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}}
        function pf(id,hz){ia();if(os[id]){os[id].stop();os[id].disconnect();}const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=hz;g.gain.value=0.1;o.connect(g);g.connect(ac.destination);o.start();os[id]=o;ip[id]=true;document.getElementById('c'+id).classList.add('active');document.getElementById('sl').value=hz;document.getElementById('sv').textContent=hz+' Hz';}
        function sfq(id){if(os[id]){os[id].stop();os[id].disconnect();os[id]=null;}ip[id]=false;document.getElementById('c'+id).classList.remove('active');}
        function tf(id){if(ip[id])sfq(id);else pf(id,sf[id].h);}
        function tm(){ia();if(ma){sa();}else{ma=true;document.getElementById('mb').textContent='DEACTIVATE THE SLING';document.getElementById('mb').classList.add('active');for(let i=1;i<=7;i++)setTimeout(()=>pf(i,sf[i].h),i*300);}}
        function sa(){ma=false;document.getElementById('mb').textContent='ACTIVATE THE SLING';document.getElementById('mb').classList.remove('active');for(let i=1;i<=7;i++)sfq(i);}
        function ds(){ia();sa();pf(6,9);setTimeout(()=>pf(1,1728),500);setTimeout(()=>pf(7,729),1000);setTimeout(()=>{[9,81,108,216,432,729,1728].forEach((hz,i)=>setTimeout(()=>pf(i+1,hz),i*100));},2000);}
        function us(v){document.getElementById('sv').textContent=v+' Hz';for(let i=1;i<=7;i++)if(ip[i]&&os[i])os[i].frequency.value=parseFloat(v);}
        function ud(){document.getElementById('cd').textContent=cv.toFixed(2);document.getElementById('ci').textContent='CYCLE '+cc+'/7 — '+sf[cc].n;}
        function st(){setInterval(()=>{cv-=0.01;if(cv<=0){cv=ct;cc=cc%7+1;}ud();},10);}
        function dr(){const c=document.getElementById('sc'),x=c.getContext('2d');c.width=c.offsetWidth;c.height=c.offsetHeight;function d(){requestAnimationFrame(d);x.fillStyle='rgba(0,0,0,0.2)';x.fillRect(0,0,c.width,c.height);x.beginPath();x.strokeStyle='#00FF41';x.lineWidth=2;const t=Date.now()/1000;for(let px=0;px<c.width;px+=2){const y=c.height/2+Math.sin(px*0.05+t*5)*30+Math.sin(px*0.02+t*3)*15;x.lineTo(px,y);}x.stroke();}d();}
        window.onload=function(){st();dr();};
    </script>
</body>
</html>
